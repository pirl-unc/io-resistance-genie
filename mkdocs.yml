site_name: io-resistance-genie
site_description: Living literature synthesis on mechanisms of resistance to anti-PD1 therapy
site_url: https://pirl-unc.github.io/io-resistance-genie/
repo_url: https://github.com/pirl-unc/io-resistance-genie
repo_name: pirl-unc/io-resistance-genie
edit_uri: edit/main/docs/

theme:
  name: material
  features:
    - navigation.top
    - navigation.instant
    - navigation.tracking
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.action.edit
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: deep orange
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: deep orange
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

markdown_extensions:
  - admonition
  - footnotes
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true

nav:
  - Home: index.md
  - Mechanisms:
    - Antigen presentation: mechanisms/antigen-presentation.md
    - IFN-γ signaling: mechanisms/ifn-gamma.md
    - TME exclusion: mechanisms/tme-exclusion.md
    - Tumor-intrinsic signaling: mechanisms/tumor-intrinsic.md
    - T-cell exhaustion: mechanisms/t-cell-exhaustion.md
    - Metabolic: mechanisms/metabolic.md
    - Clinical interventions: mechanisms/clinical-interventions.md
  - Changelog:
    - 2026-04-21 (seed): changelog/2026-04-21.md
  - Papers: papers.md
